# no-cats-land — Home Assistant package (auto-merged by HA). Managed by Claude.
# Board at 192.168.1.23 (DHCP-reserved, MAC 78:21:84:ac:12:60).

rest_command:
  nocatsland_arm:
    url: "http://192.168.1.23/arm"
  nocatsland_disarm:
    url: "http://192.168.1.23/disarm"
  nocatsland_test:
    url: "http://192.168.1.23/test"
  nocatsland_reset:
    url: "http://192.168.1.23/reset"
  nocatsland_set_pulse:
    url: "http://192.168.1.23/set?pulse={{ value | int }}"
  nocatsland_set_cooldown:
    url: "http://192.168.1.23/set?cooldown={{ (value | int) * 1000 }}"
  nocatsland_set_hold:
    url: "http://192.168.1.23/set?hold={{ value | int }}"
  nocatsland_set_maxshots:
    url: "http://192.168.1.23/set?maxshots={{ value | int }}"

rest:
  - resource: "http://192.168.1.23/status"
    scan_interval: 5
    timeout: 5
    sensor:
      - name: "no-cats-land state"
        value_template: "{{ value_json.state }}"
        icon: mdi:state-machine
      - name: "no-cats-land shots total"
        value_template: "{{ value_json.shots_total }}"
        state_class: total_increasing
        icon: mdi:water
      - name: "no-cats-land motion events"
        value_template: "{{ value_json.motion_events }}"
        state_class: total_increasing
        icon: mdi:motion-sensor
      - name: "no-cats-land last motion s"
        value_template: "{{ value_json.last_motion_s }}"
        unit_of_measurement: "s"
      - name: "no-cats-land cooldown left s"
        value_template: "{{ value_json.cooldown_left_s }}"
        unit_of_measurement: "s"
      - name: "no-cats-land uptime s"
        value_template: "{{ value_json.uptime_s }}"
        unit_of_measurement: "s"
        device_class: duration
      - name: "no-cats-land rssi"
        value_template: "{{ value_json.rssi }}"
        unit_of_measurement: "dBm"
        device_class: signal_strength
        state_class: measurement
      - name: "no-cats-land pulse ms"
        value_template: "{{ value_json.pulse_ms }}"
        unit_of_measurement: "ms"
      - name: "no-cats-land cooldown ms"
        value_template: "{{ value_json.cooldown_ms }}"
        unit_of_measurement: "ms"
      - name: "no-cats-land hold ms"
        value_template: "{{ value_json.hold_ms }}"
        unit_of_measurement: "ms"
      - name: "no-cats-land max shots"
        value_template: "{{ value_json.max_shots }}"
    binary_sensor:
      - name: "no-cats-land motion"
        device_class: motion
        value_template: "{{ value_json.motion == 1 }}"
      - name: "no-cats-land armed"
        value_template: "{{ value_json.armed }}"
        icon: mdi:shield
      - name: "no-cats-land limit hit"
        value_template: "{{ value_json.limit_hit == 1 }}"
        icon: mdi:alert-octagon

switch:
  - platform: template
    switches:
      no_cats_land:
        friendly_name: "no-cats-land armed"
        value_template: "{{ is_state('binary_sensor.no_cats_land_armed', 'on') }}"
        turn_on:
          service: rest_command.nocatsland_arm
        turn_off:
          service: rest_command.nocatsland_disarm

template:
  - sensor:
      # one human-readable status line for the dashboard
      - name: "no-cats-land status"
        icon: mdi:cat
        state: >-
          {% if is_state('binary_sensor.no_cats_land_armed','off') %}Rozbrojony
          {% elif is_state('sensor.no_cats_land_state','warmup') %}Rozgrzewka
          {% elif is_state('sensor.no_cats_land_state','active') %}STRZAL
          {% elif is_state('sensor.no_cats_land_state','cooldown') %}Cooldown
          {% else %}Czuwa{% endif %}
  - button:
      - name: "no-cats-land test fire"
        icon: mdi:water-pump
        press:
          - service: rest_command.nocatsland_test
      - name: "no-cats-land reset counters"
        icon: mdi:counter
        press:
          - service: rest_command.nocatsland_reset
  - number:
      - name: "no-cats-land pulse"
        unit_of_measurement: "ms"
        min: 50
        max: 5000
        step: 50
        state: "{{ states('sensor.no_cats_land_pulse_ms') | int(500) }}"
        set_value:
          - service: rest_command.nocatsland_set_pulse
            data:
              value: "{{ value }}"
      - name: "no-cats-land cooldown"
        unit_of_measurement: "s"
        min: 0
        max: 120
        step: 5
        state: "{{ (states('sensor.no_cats_land_cooldown_ms') | int(15000)) / 1000 }}"
        set_value:
          - service: rest_command.nocatsland_set_cooldown
            data:
              value: "{{ value }}"
      - name: "no-cats-land hold"
        unit_of_measurement: "ms"
        min: 0
        max: 3000
        step: 50
        state: "{{ states('sensor.no_cats_land_hold_ms') | int(600) }}"
        set_value:
          - service: rest_command.nocatsland_set_hold
            data:
              value: "{{ value }}"
      - name: "no-cats-land max shots"
        min: 0
        max: 100
        step: 5
        state: "{{ states('sensor.no_cats_land_max_shots') | int(20) }}"
        set_value:
          - service: rest_command.nocatsland_set_maxshots
            data:
              value: "{{ value }}"

# Clean shot notification: fires when the shot counter goes UP (reliable even though
# the 0.5s "active" state is too short for the 5s poll to catch).
automation:
  - alias: "no-cats-land: shot fired"
    id: nocatsland_shot_fired
    trigger:
      - platform: state
        entity_id: sensor.no_cats_land_shots_total
    condition:
      - condition: template
        value_template: >-
          {{ trigger.from_state.state not in ['unknown','unavailable','']
             and trigger.to_state.state | int(0) > trigger.from_state.state | int(0) }}
    action:
      - service: persistent_notification.create
        data:
          title: "no-cats-land 💦"
          message: "Strzal #{{ states('sensor.no_cats_land_shots_total') }} — kot przegoniony 🐱"
  - alias: "no-cats-land: safety auto-disarm"
    id: nocatsland_limit_hit
    trigger:
      - platform: state
        entity_id: binary_sensor.no_cats_land_limit_hit
        to: "on"
    action:
      - service: persistent_notification.create
        data:
          title: "no-cats-land 🛡️"
          message: "Rozbrojono — osiagnieto limit {{ states('sensor.no_cats_land_max_shots') }} strzalow."
